app = 'bobiverse-tracker'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 10
    soft_limit = 5

  [[http_service.checks]]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    timeout = '5s'
    path = '/_stcore/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
